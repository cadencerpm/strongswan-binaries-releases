name: Build and release

on:
  pull_request:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: strongswan-rootfs-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build rootfs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Build artifact
        run: make build

      - name: Smoke test artifact
        run: make test

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: strongswan-trixie-arm64-rootfs
          path: |
            dist/strongswan-trixie-arm64-rootfs.tar
            dist/strongswan-trixie-arm64-package-manifest.tsv
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: strongswan-trixie-arm64-rootfs
          path: dist

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release upload "${TAG_NAME}" dist/* --clobber
          else
            gh release create "${TAG_NAME}" dist/* --verify-tag --generate-notes --title "${TAG_NAME}"
          fi
