name: Build and release

on:
  pull_request:
  workflow_dispatch:
  push:
    branches:
      - main
    tags:
      - "v*"

concurrency:
  group: ${{ github.ref == 'refs/heads/main' && format('strongswan-rootfs-{0}', github.sha) || format('strongswan-rootfs-{0}', github.ref) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build rootfs
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build artifact
        run: make build

      - name: Smoke test artifact
        run: make test

      - name: Upload workflow artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: strongswan-rootfs
          path: |
            dist/strongswan-*-rootfs.tar
            dist/strongswan-*-package-manifest.tsv
            dist/SHA256SUMS
          if-no-files-found: error

  release:
    name: Publish GitHub release
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          name: strongswan-rootfs
          path: dist

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          release_args=()
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag_name="${GITHUB_REF_NAME}"
            title="${GITHUB_REF_NAME}"
            release_args+=(--verify-tag --generate-notes)
          else
            short_sha="${GITHUB_SHA::12}"
            tag_name="main-${short_sha}"
            title="main ${short_sha}"
            release_args+=(--target "${GITHUB_SHA}" --prerelease --latest=false)
          fi

          rootfs="$(awk '$2 ~ /^strongswan-.*-rootfs[.]tar$/ { print $2; exit }' dist/SHA256SUMS)"
          sha256="$(awk -v rootfs="${rootfs}" '$2 == rootfs { print $1 }' dist/SHA256SUMS)"
          if [[ -z "${rootfs}" || -z "${sha256}" ]]; then
            echo "missing versioned rootfs entry in dist/SHA256SUMS" >&2
            exit 1
          fi

          strongswan_version="${rootfs#strongswan-}"
          strongswan_version="${strongswan_version%-trixie-arm64-rootfs.tar}"
          notes="$(printf 'strongSwan `%s` rootfs build for `%s`.\n\n- `%s`: `%s`\n' "${strongswan_version}" "${GITHUB_SHA}" "${rootfs}" "${sha256}")"

          if gh release view "${tag_name}" >/dev/null 2>&1; then
            gh release upload "${tag_name}" dist/* --clobber
          else
            gh release create "${tag_name}" dist/* "${release_args[@]}" --notes "${notes}" --title "${title}"
          fi
